<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 210" fill="none">
  <!-- Tail (behind body) -->
  <g transform="translate(130, 155) rotate(10)">
    <rect x="0" y="0" width="60" height="24" rx="12" fill="#C07050"/>
    <rect x="40" y="2" width="20" height="20" rx="10" fill="#F5E6D0"/>
  </g>

  <!-- Body -->
  <rect x="50" y="120" width="100" height="75" rx="25" fill="#C07050"/>
  <!-- Chest/belly -->
  <rect x="65" y="130" width="70" height="50" rx="25" fill="#F5E6D0"/>
  <!-- Front paws -->
  <ellipse cx="72" cy="192" rx="10" ry="6" fill="#A05A3A"/>
  <ellipse cx="128" cy="192" rx="10" ry="6" fill="#A05A3A"/>

  <!-- Head -->
  <rect x="40" y="20" width="120" height="110" rx="44" fill="#C07050"/>

  <!-- Left ear -->
  <polygon points="52,30 70,30 61,2" fill="#C07050"/>
  <polygon points="56,28 66,28 61,10" fill="#E8A070"/>
  <!-- Right ear -->
  <polygon points="130,30 148,30 139,2" fill="#C07050"/>
  <polygon points="134,28 144,28 139,10" fill="#E8A070"/>

  <!-- White face/muzzle -->
  <rect x="60" y="72" width="80" height="56" rx="28" fill="#F5E6D0"/>

  <!-- Glasses - left lens -->
  <rect x="62" y="42" width="30" height="24" rx="7" stroke="#3A2A1A" stroke-width="3" fill="rgba(200,220,240,0.12)"/>
  <!-- Bridge -->
  <rect x="92" y="51" width="16" height="3" rx="1.5" fill="#3A2A1A"/>
  <!-- Glasses - right lens -->
  <rect x="108" y="42" width="30" height="24" rx="7" stroke="#3A2A1A" stroke-width="3" fill="rgba(200,220,240,0.12)"/>

  <!-- Left eye -->
  <circle cx="77" cy="56" r="5" fill="#2A1A0A"/>
  <circle cx="75" cy="54" r="2" fill="#FFF"/>
  <!-- Right eye -->
  <circle cx="123" cy="56" r="5" fill="#2A1A0A"/>
  <circle cx="121" cy="54" r="2" fill="#FFF"/>

  <!-- Nose -->
  <ellipse cx="100" cy="82" rx="6" ry="4" fill="#2A1A0A"/>

  <!-- Smile -->
  <path d="M90 90 Q100 100 110 90" stroke="#3A2A1A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
