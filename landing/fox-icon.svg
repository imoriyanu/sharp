<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" fill="none">
  <!-- Head -->
  <rect x="20" y="30" width="160" height="140" rx="56" fill="#C07050"/>

  <!-- Left ear -->
  <polygon points="38,40 68,40 53,4" fill="#C07050"/>
  <polygon points="44,38 62,38 53,14" fill="#E8A070"/>
  <!-- Right ear -->
  <polygon points="132,40 162,40 147,4" fill="#C07050"/>
  <polygon points="138,38 156,38 147,14" fill="#E8A070"/>

  <!-- White face/muzzle -->
  <rect x="44" y="90" width="112" height="76" rx="38" fill="#F5E6D0"/>

  <!-- Glasses - left lens -->
  <rect x="46" y="52" width="42" height="34" rx="10" stroke="#3A2A1A" stroke-width="4" fill="rgba(200,220,240,0.12)"/>
  <!-- Bridge -->
  <rect x="88" y="65" width="24" height="4" rx="2" fill="#3A2A1A"/>
  <!-- Glasses - right lens -->
  <rect x="112" y="52" width="42" height="34" rx="10" stroke="#3A2A1A" stroke-width="4" fill="rgba(200,220,240,0.12)"/>

  <!-- Left eye -->
  <circle cx="67" cy="72" r="7" fill="#2A1A0A"/>
  <circle cx="64" cy="69" r="2.5" fill="#FFF"/>
  <!-- Right eye -->
  <circle cx="133" cy="72" r="7" fill="#2A1A0A"/>
  <circle cx="130" cy="69" r="2.5" fill="#FFF"/>

  <!-- Nose -->
  <ellipse cx="100" cy="106" rx="8" ry="6" fill="#2A1A0A"/>

  <!-- Smile -->
  <path d="M85 118 Q100 132 115 118" stroke="#3A2A1A" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
